<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账号管理器设置</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            user-select: none;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: white;
            font-size: 2rem;
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: white;
            margin-top: 10px;
        }

        /* API 警告条 */
        .api-warning {
            background: linear-gradient(135deg, #f5af19 0%, #f12711 100%);
            color: white;
            padding: 16px 20px;
            border-radius: 16px;
            margin-bottom: 24px;
            display: none;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            opacity: 0;
            transition-duration: 300ms;
        }

        .api-warning.show {
            display: flex;
            opacity: 1;
        }

        .api-warning .icon {
            font-size: 28px;
        }

        .api-warning .content {
            flex: 1;
        }

        .api-warning .title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .api-warning .desc {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .api-warning button {
            background: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            color: #f12711;
            transition: transform 0.2s;
        }

        .api-warning button:hover {
            transform: scale(1.02);
        }

        /* 卡片通用样式 */
        .card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #333;
            border-left: 4px solid #667eea;
            padding-left: 16px;
        }

        /* 账号列表 */
        .accounts-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .account-item {
            background: #f8f9fa;
            border-radius: 14px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
            border: 1px solid #e9ecef;
        }

        .account-item:hover {
            background: #fff;
            border-color: #667eea;
            box-shadow: 0 2px 8px rgba(102,126,234,0.1);
        }

        .account-info {
            flex: 1;
        }

        .account-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .account-id {
            font-size: 0.75rem;
            color: #888;
            background: #e9ecef;
            padding: 2px 8px;
            border-radius: 12px;
        }

        .account-badge {
            font-size: 0.65rem;
            padding: 2px 10px;
            border-radius: 12px;
            font-weight: 500;
        }

        .badge-token {
            background: #d4edda;
            color: #155724;
        }

        .badge-password {
            background: #fff3cd;
            color: #856404;
        }

        .account-token {
            font-size: 0.7rem;
            color: #aaa;
            font-family: monospace;
            margin-top: 6px;
            word-break: break-all;
        }

        .account-actions {
            display: flex;
            gap: 8px;
        }

        /* 按钮样式 */
        .btn {
            padding: 8px 16px;
            border-radius: 10px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102,126,234,0.4);
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #dee2e6;
            color: #666;
        }

        .btn-outline:hover {
            background: #f8f9fa;
            border-color: #667eea;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.75rem;
        }

        /* 表单样式 */
        .form-group {
            margin-bottom: 16px;
        }

        .form-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .form-row .form-group {
            flex: 1;
            min-width: 150px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }

        input, select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 0.9rem;
            transition: all 0.2s;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        /* Tab 切换 */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e9ecef;
        }

        .tab {
            padding: 10px 20px;
            background: none;
            border: none;
            font-size: 0.9rem;
            font-weight: 500;
            color: #888;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 10px 10px 0 0;
        }

        .tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
            margin-bottom: -2px;
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active {
            display: block;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }

        /* 工具栏 */
        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }

        .toolbar-left {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        #main-content { transition-duration: 300ms; }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .account-item {
                flex-direction: column;
                gap: 12px;
            }
            .account-actions {
                width: 100%;
                justify-content: flex-end;
            }
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
    <link rel="icon" href="https://www.chen-jin.dpdns.org/Chen-Jin-circle.png">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>账号管理器设置</h1>
        </div>

        <!-- API 检测警告 -->
        <div id="api-warning" class="api-warning">
            <div class="icon">⚠️</div>
            <div class="content">
                <div class="title">脚本未检测到或版本过低</div>
                <div class="desc">请先安装/更新「账号管理器」用户脚本，然后刷新本页面。</div>
            </div>
            <button id="install-script-btn">📦 安装最新版</button>
        </div>

        <!-- 主内容 -->
        <div id="main-content" style="opacity: 0; pointer-events: none">
            <!-- 账号列表卡片 -->
            <div class="card">
                <div class="card-title">
                    <span>📋</span> 我的账号
                </div>
                <div class="toolbar">
                    <div class="toolbar-left">
                        <button id="refresh-btn" class="btn btn-outline btn-sm">🔄 刷新列表</button>
                    </div>
                    <div class="toolbar-left">
                        <button id="export-btn" class="btn btn-outline btn-sm">📦 导出配置</button>
                        <button id="import-btn" class="btn btn-outline btn-sm">📂 导入配置</button>
                    </div>
                </div>
                <div id="accounts-list" class="accounts-list">
                    <div class="empty-state">
                        <div>暂无账号</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="tabs">
                    <button class="tab active" data-tab="password">🔒 密码添加</button>
                    <button class="tab" data-tab="token">🔑 Token 添加</button>
                </div>

                <div id="tab-password" class="tab-pane active">
                    <form id="add-form-password">
                        <div class="form-group">
                            <label>CCW ID</label>
                            <input type="text" id="pwd-student-id" required>
                        </div>
                        <div class="form-group">
                            <label>密码</label>
                            <input type="password" id="pwd-value" required>
                        </div>
                        <button type="submit" class="btn btn-primary" id="add-by-password-btn">➕ 添加账号</button>
                        <div id="pwd-status" style="margin-top: 12px; font-size: 0.8rem; color: #888;"></div>
                    </form>
                </div>

                <div id="tab-token" class="tab-pane">
                    <form id="add-form-token">
                        <div class="form-group">
                            <label>Token</label>
                            <input type="text" id="token-value" required>
                        </div>
                        <button type="submit" class="btn btn-primary">➕ 添加账号</button>
                        <div id="token-status" style="margin-top: 12px; font-size: 0.8rem; color: #888;"></div>
                    </form>
                    <div id="token-permission-warning" class="api-warning" style="display: none; margin-bottom: 16px;">
                        <div class="icon">⚠️</div>
                        <div class="content">
                            <div class="title">HttpOnly Cookie 权限未开启</div>
                            <div class="desc">Token 添加功能需要此权限才能工作。</div>
                        </div>
                        <button id="fix-permission-btn">🔧 查看解决方法</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">
                    <span>🖥️</span> 设备设置
                </div>
                <form id="device-settings-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>设备名称</label>
                            <input type="text" id="device-name" value="正在获取">
                        </div>
                        <div class="form-group">
                            <label>浏览器名称</label>
                            <input type="text" id="browser-name" value="正在获取">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">💾 保存设置</button>
                    <div id="device-status" style="margin-top: 12px; font-size: 0.8rem; color: #888;"></div>
                </form>
            </div>
        </div>
    </div>

    <script>
        async function checkAPI() {
            await new Promise(r => setTimeout(r, 200));
            if (window.accountManager) {
                document.getElementById('main-content').style.opacity = '1';
                document.getElementById('main-content').style.pointerEvents = "auto";
                return true;
            } else {
                document.getElementById('install-script-btn').onclick = () => open('https://us.chen-jin.dpdns.org/accountManager.user.js', '_blank');
                document.getElementById('api-warning').classList.add('show');
                return false;
            }
        }

        let currentAccounts = {};
        async function loadAccounts() {            
            currentAccounts = await accountManager.GM_getValue('accounts', {});
            const container = document.getElementById('accounts-list');
            
            const accountEntries = Object.entries(currentAccounts);
            if (accountEntries.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div>暂无账号</div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = '';
            for (const [id, data] of accountEntries) {
                const isTokenAccount = data.token !== undefined;
                const badgeText = isTokenAccount ? '🔑 Token 创建' : '🔒 密码创建';
                const badgeClass = isTokenAccount ? 'badge-token' : 'badge-password';
                
                const div = document.createElement('div');
                div.className = 'account-item';
                div.innerHTML = `
                    <div class="account-info">
                        <div class="account-name">
                            ${escapeHtml(data.name)}
                            <span class="account-id">${escapeHtml(id)}</span>
                            <span class="account-badge ${badgeClass}">${badgeText}</span>
                        </div>
                    </div>
                    <div class="account-actions">
                        <button class="btn btn-danger btn-sm delete-btn" data-id="${escapeHtml(id)}">
                            🗑️ 删除
                        </button>
                    </div>
                `;
                container.appendChild(div);
            }
            
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.onclick = async () => {
                    const id = btn.dataset.id;
                    if (!confirm(`确定删除账号 ${id}？`)) return;
                    const accounts = await accountManager.GM_getValue('accounts', {});
                    delete accounts[id];
                    await accountManager.GM_setValue('accounts', accounts);
                    loadAccounts();
                };
            });
        }

        function addByToken(token) {
            const statusDiv = document.getElementById('token-status');
            statusDiv.innerHTML = '<span class="loading"></span> 正在获取账号信息...';
            statusDiv.style.color = '#667eea';
            
            return new Promise((resolve) => {
                accountManager.GM_xmlhttpRequest({
                    url: 'https://community-web.ccw.site/students/self/detail',
                    method: 'post',
                    data: '{}',
                    anonymous: true,
                    headers: {
                        cookie: 'token=' + token,
                        'content-type': 'application/json',
                    },
                    onload: xhr => {
                        try {
                            const body = JSON.parse(xhr.response).body;
                            if (!body) {
                                statusDiv.innerHTML = '❌ token 无效';
                                statusDiv.style.color = '#dc3545';
                                resolve(false);
                                return;
                            }
                            
                            const accounts = accountManager.GM_getValue('accounts', {});
                            accounts[body.studentNumber] = { 
                                name: body.name, 
                                token: token 
                            };
                            accountManager.GM_setValue('accounts', accounts);
                            loadAccounts();
                            statusDiv.innerHTML = '✅ 添加成功';
                            statusDiv.style.color = '#28a745';
                            setTimeout(() => statusDiv.innerHTML = '', 2000);
                            resolve(true);
                        } catch (err) {
                            statusDiv.innerHTML = '❌ 解析失败: ' + err.message;
                            statusDiv.style.color = '#dc3545';
                            resolve(false);
                        }
                    },
                    onerror: () => {
                        statusDiv.innerHTML = '❌ 网络请求失败';
                        statusDiv.style.color = '#dc3545';
                        resolve(false);
                    }
                });
            });
        }

        async function addByPassword(studentNumber, password) {
            const statusDiv = document.getElementById('pwd-status');
            statusDiv.style.color = '#667eea';
            
            try {
                statusDiv.innerHTML = '<span class="loading"></span> 正在获取用户信息';
                const profileRes = await fetch("https://community-web.ccw.site/students/profile", {
                    method: "post",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ studentNumber })
                });
                const profileData = await profileRes.json();                
                if (!profileData.body) {
                    statusDiv.innerHTML = '❌ 用户不存在';
                    statusDiv.style.color = '#dc3545';
                    return false;
                }
                statusDiv.innerHTML = '<span class="loading"></span> 正在验证密码...';
                const loginRes = await fetch("https://sso.ccw.site/web/auth/login-by-password", {
                    method: 'POST',
                    credentials: 'include',
                    body: JSON.stringify({
                        loginKey: studentNumber,
                        password: password,
                        clientCode: "STUDY_COMMUNITY",
                        extra: JSON.stringify({
                            device: accountManager.GM_getValue('device', '账号管理器创建'),
                            browser: accountManager.GM_getValue('browser', '账号管理器创建')
                        })
                    }),
                    headers: { 'Content-Type': 'application/json' }
                });                
                const loginData = await loginRes.json();
                if (!loginData.body) {
                    statusDiv.innerHTML = `❌ ${loginData.msg}`;
                    statusDiv.style.color = '#dc3545';
                    return false;
                }
                
                const userName = profileData.body.name;
                const accounts = await accountManager.GM_getValue('accounts', {});
                accounts[studentNumber] = { 
                    name: userName, 
                    pwd: password
                };
                accountManager.GM_setValue('accounts', accounts);
                
                statusDiv.innerHTML = `✅ 已添加 ${userName}`;
                statusDiv.style.color = '#28a745';
                
                document.getElementById('pwd-student-id').value = '';
                document.getElementById('pwd-value').value = '';
                loadAccounts();
                setTimeout(() => statusDiv.innerHTML === `✅ 已添加 ${userName}` && (statusDiv.innerHTML = ''), 3000);
                return true;
            } catch (err) {
                statusDiv.innerHTML = `❌ 请求失败: ${err.message}`;
                statusDiv.style.color = '#dc3545';
                return false;
            }
        }


        async function exportConfig() {
            const accounts = await accountManager.GM_getValue('accounts', {});
            const url = 'data:application/data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(accounts, null, 2));
            const a = document.createElement('a');
            a.href = url;
            a.download = `ccw-accounts-${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }


        function importConfig() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const text = await file.text();
                try {
                    const accounts = JSON.parse(text);
                    await accountManager.GM_setValue('accounts', accounts);
                    alert('导入成功');
                    loadAccounts();
                } catch(err) {
                    alert('导入失败: ' + err.message);
                }
            };
            input.click();
        }


        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }


        function initTabs() {
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(tab => {
                tab.onclick = () => {
                    const tabId = tab.dataset.tab;
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');                    
                    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
                    document.getElementById(`tab-${tabId}`).classList.add('active');
                };
            });
        }

        async function saveDeviceSettings(deviceName, browserName) {
            accountManager.GM_setValue('device', deviceName);
            accountManager.GM_setValue('browser', browserName);
            const statusDiv = document.getElementById('device-status');
            statusDiv.innerHTML = '✅ 设置已保存';
            statusDiv.style.color = '#28a745';
            setTimeout(() => statusDiv.innerHTML = '', 2000);
        }
        
        (async () => {
            const apiOk = await checkAPI();
            if (!apiOk) return;
            
            initTabs();
            await loadAccounts();
            
            document.getElementById('refresh-btn').onclick = loadAccounts;
            document.getElementById('export-btn').onclick = exportConfig;
            document.getElementById('import-btn').onclick = importConfig;
            
            document.getElementById('add-form-token').onsubmit = async (e) => {
                e.preventDefault();
                const token = document.getElementById('token-value').value.trim();
                if (!token) return alert('请填写 token');                
                await addByToken(token);
            };
            
            document.getElementById('add-form-password').onsubmit = async (e) => {
                e.preventDefault();
                const studentId = document.getElementById('pwd-student-id').value.trim();
                const password = document.getElementById('pwd-value').value;
                if (!studentId || !password) return alert('请填写 CCW ID 和密码');                
                await addByPassword(studentId, password);
            };

            document.getElementById('device-settings-form').onsubmit = (e) => {
                e.preventDefault();
                const deviceName = document.getElementById('device-name').value.trim() || '账号管理器创建';
                const browserName = document.getElementById('browser-name').value.trim() || '账号管理器创建';
                saveDeviceSettings(deviceName, browserName);
            };

            document.getElementById('device-name').value = accountManager.GM_getValue('device', '账号管理器创建');
            document.getElementById('browser-name').value = accountManager.GM_getValue('browser', '账号管理器创建');
            
            accountManager.GM_cookie.set({
                url: location.href,
                name: 'test',
                value: 'v',
                httpOnly: true,
            }, result => {
                const warningDiv = document.getElementById('token-permission-warning');
                if (warningDiv) {
                    if (result?.message?.includes('HTTP-only')) {
                        warningDiv.classList.add('show');
                        const fixBtn = document.getElementById('fix-permission-btn');
                        if (fixBtn) {
                            fixBtn.onclick = () => {
                                alert('请按以下步骤操作：\n\n1. 点击浏览器工具栏的暴力猴图标\n2. 找到「账号管理器」脚本，点击「设置」\n3. 勾选「允许访问 HttpOnly Cookie」\n4. 保存并刷新本页面');
                            };
                        }
                    }
                }
            });
        })();
    </script>
</body>
</html>
